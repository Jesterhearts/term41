[package]
name         = "term41"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.95.0"
license      = "Unlicense"

[workspace]
members = [
  "font41",
  "vtepp",
]

[workspace.dependencies]
bitflags = "2.11.1"
flate2   = "1.1.9"
log      = "0.4.29"
png      = "0.18.1"
smol_str = "0.3.6"

[[bench]]
harness = false
name    = "vte_parse"

[dependencies]
arboard              = { version = "3.6.1", default-features = false, features = [
  "image-data"
] }
atoi                 = "2.0.0"
atomic-write-file    = { version = "0.3.0", optional = true }
base64               = "0.22.1"
bitflags             = { workspace = true }
bytemuck             = { version = "1.25.0", features = [
  "derive",
  "extern_crate_alloc"
] }
cueue                = "0.6.0"
dirs                 = "6.0.0"
evictor              = "0.7.2"
ffmpeg-next          = { version = "8.1.0", optional = true }
flate2               = { workspace = true }
font41               = { path = "font41" }
fontdb               = "0.23.0"
harfrust             = "0.6.0"
infer                = { version = "0.19.0", default-features = false }
libc                 = "0.2.184"
log                  = { workspace = true }
notify               = "8.2.0"
open                 = "5.3.3"
palette              = { version = "0.7.6", default-features = false, features = [
  "named",
  "named_from_str",
  "std",
] }
percent-encoding     = "2.3.2"
png                  = { workspace = true }
pollster             = "0.4.0"
portable-pty         = "0.9.0"
serde                = { version = "1.0.228", features = ["derive"] }
shellexpand          = "3.1.2"
smol_str             = { workspace = true }
toml                 = "1.1.2"
tracing              = "0.1.44"
tracing-subscriber   = { version = "0.3.23", features = ["env-filter"] }
unicode-segmentation = "1.13.2"
unicode-width        = "0.2.2"
vtepp                = { path = "vtepp" }
wgpu                 = { version = "29.0.1", default-features = false, features = [
  "gles",
  "serde",
  "wgsl"
] }
winit                = "0.30.13"

[dev-dependencies]
criterion = { version = "0.8.2", default-features = false, features = [
  "html_reports"
] }

[features]
default              = ["ffmpeg", "wayland-data-control"]
# Pulls in ffmpeg-next so image protocols can decode formats outside the
# built-in PNG path (animated GIF is the motivating case). Requires the
# libav* dev packages on the host; leave off for lightweight builds.
ffmpeg               = ["dep:ffmpeg-next"]
# Pulls in atomic-write-file and the wgpu vulkan feature, enabling pipeline
# caching on Vulkan. The cache can improve startup times by avoiding shader
# compilation, but vulkan sometimes just takes O(seconds) to startup even with
# caching, which makes us look bad so it's off by default.
vulkan               = ["dep:atomic-write-file", "wgpu/vulkan"]
# Enables arboard's zwlr_data_control_manager_v1 backend on Wayland, giving
# access to compositors that implement the protocol (sway, wayfire, Hyprland,
# etc.) without requiring a focused-window hack. Disable only for
# environments where the dependency is unavailable.
wayland-data-control = ["arboard/wayland-data-control"]

[profile.release-debug]
inherits = "release"
debug    = true
