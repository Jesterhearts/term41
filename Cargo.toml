[package]
name    = "term41"
version = "0.1.0"
edition = "2024"
license = "Unlicense"

[dependencies]
arboard              = { version = "3.6.1", default-features = false }
atoi                 = "2.0.0"
base64               = "0.22.1"
bytemuck             = { version = "1.25.0", features = [
  "derive",
  "extern_crate_alloc"
] }
dirs                 = "6.0.0"
env_logger           = "0.11.10"
evictor              = "0.5.1"
flate2               = "1.1.9"
fontdb               = "0.23.0"
harfrust             = "0.6.0"
libc                 = "0.2.184"
log                  = "0.4.29"
palette              = { version = "0.7.6", default-features = false, features = [
  "std"
] }
png                  = "0.18.1"
pollster             = "0.4.0"
portable-pty         = "0.9.0"
raqote               = { version = "0.8.5", default-features = false }
read-fonts           = "0.39.1"
# OpenType SVG emoji are essentially static vector artwork — no <text> runs, no
# <image> tags, no filesystem font lookup. Disable resvg's default features and
# rasterize just the paint tree via tiny-skia.
resvg                = { version = "0.47.0", default-features = false }
serde                = { version = "1.0.228", features = ["derive"] }
smol_str             = "0.3.6"
toml                 = "1.1.2"
unicode-segmentation = "1.12.0"
unicode-width        = "0.2.2"
wgpu                 = "29.0.1"
winit                = "0.30.13"

[features]
default              = ["wayland-data-control"]
# Enables arboard's zwlr_data_control_manager_v1 backend on Wayland, giving
# access to compositors that implement the protocol (sway, wayfire, Hyprland,
# etc.) without requiring a focused-window hack. Disable only for
# environments where the dependency is unavailable.
wayland-data-control = ["arboard/wayland-data-control"]
