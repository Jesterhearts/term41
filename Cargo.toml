[package]
name    = "term41"
version = "0.1.0"
edition = "2024"

[dependencies]
atoi                 = "2.0.0"
bytemuck             = { version = "1.25.0", features = [
  "derive",
  "extern_crate_alloc"
] }
crop                 = { version = "0.4.3", features = ["graphemes"] }
dirs                 = "6.0.0"
env_logger           = "0.11.10"
fontdb               = "0.23.0"
harfrust             = "0.6.0"
libc                 = "0.2.184"
log                  = "0.4.29"
palette              = { version = "0.7.6", default-features = false, features = [
  "std"
] }
pollster             = "0.4.0"
rangemap             = "1.7.1"
raqote               = { version = "0.8.5", default-features = false }
read-fonts           = "0.39.1"
serde                = { version = "1.0.228", features = ["derive"] }
toml                 = "1.1.2"
unicode-segmentation = "1.13.2"
wgpu                 = "29.0.1"
winit                = "0.30.13"
